name: Update Paper Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: paper-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch source feeds
        env:
          PAPER_DAILY_LOOKBACK_DAYS: 5
        run: node scripts/fetch-sources.mjs

      - name: Score papers with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_PRESCREEN_MODEL: deepseek-v4-flash
          DEEPSEEK_SCORE_MODEL: deepseek-v4-pro
        run: node scripts/score-papers.mjs

      - name: Sync latest branch before commit
        run: git pull --rebase --autostash origin main

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily paper data"
          file_pattern: data/candidates.json data/latest.json data/paper-cache.json
